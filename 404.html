<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 迷路了</title>
  <style>
    * { margin: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #f5e6a3;
      font-family: 'Roboto', Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .container {
      max-width: 440px;
    }

    h1 {
      font-size: 6rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffc107, #ff4081);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p { margin: 12px 0; font-size: 1.1rem; opacity: 0.85; }

    a.home-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ffc107, #ff9800);
      color: #000;
      font-weight: 700;
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    a.home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(255, 152, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>😵 Oops！這個頁面不存在</p>
    <p>看起來你迷路了，讓我帶你回家～</p>
    <a href="/" class="home-btn">🏠 回首頁</a>
  </div>
</body>
</html>
